# ─────────────────────────────────────────────────────────────
#  Voice Assistant Chatbot — Application Properties
#  Copy this file to src/main/resources/application.properties
#  and fill in your API keys.
# ─────────────────────────────────────────────────────────────

spring.application.name=voice-assistant-chatbot
server.port=8080

# ── AI (Groq — free & fast) ───────────────────────────────────
# Sign up at https://console.groq.com → API Keys
app.ai.api-key=REPLACE_WITH_YOUR_GROQ_KEY
app.ai.base-url=https://api.groq.com/openai/v1
app.ai.model=llama3-8b-8192
app.ai.system-prompt=You are a helpful, friendly voice assistant named Aria. \
  Keep answers concise and easy to understand when spoken aloud. \
  Avoid using markdown, bullet points, or code formatting in casual replies.

# ── Weather (OpenWeatherMap — free tier) ──────────────────────
# Sign up at https://openweathermap.org/api
app.weather.api-key=REPLACE_WITH_YOUR_OPENWEATHER_KEY

# ── Server-side TTS (FreeTTS — optional) ─────────────────────
# Set to true only if running as a desktop/server app with audio output.
# Leave false to use browser Web Speech API (recommended for web).
app.speech.enabled=false
app.speech.rate=150
app.speech.volume=1.0

# ── HTTP client timeouts ──────────────────────────────────────
app.http.connect-timeout=10
app.http.read-timeout=30

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Logging ───────────────────────────────────────────────────
logging.level.com.assistant=INFO
logging.level.okhttp3=WARN
